<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Success Library | Management</title>
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .premium-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .premium-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        #modal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }

        .hidden-view { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 p-4 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-600/30">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight italic uppercase">SAVITRI SUCCESS</h1>
                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest leading-none">Library Admin</p>
            </div>
        </div>
        <div id="headerActions">
             <button onclick="showView('dashboard')" class="text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-home text-xl"></i>
             </button>
        </div>
    </header>

    <main class="p-5 max-w-2xl mx-auto space-y-6">
        
        <!-- View 1: Main Dashboard Grid -->
        <div id="view-dashboard" class="space-y-6">
            <div class="mb-2">
                <h2 class="text-2xl font-black italic tracking-tight">DASHBOARD</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">Management Console</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Card 1: Members -->
                <div onclick="showView('members')" class="premium-card p-6 rounded-[2.5rem] text-center flex flex-col items-center justify-center min-h-[160px]">
                    <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center mb-3">
                        <i class="fas fa-users text-indigo-400 text-xl"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest">Members</h3>
                    <p class="text-[10px] text-slate-500 mt-1" id="stat-count">Loading...</p>
                </div>

                <!-- Card 2: Attendance -->
                <div onclick="showView('attendance')" class="premium-card p-6 rounded-[2.5rem] text-center flex flex-col items-center justify-center min-h-[160px]">
                    <div class="w-12 h-12 bg-amber-500/10 rounded-2xl flex items-center justify-center mb-3">
                        <i class="fas fa-clock text-amber-400 text-xl"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest">Attendance</h3>
                    <p class="text-[10px] text-slate-500 mt-1">Check Logs</p>
                </div>

                <!-- Card 3: Fees -->
                <div onclick="showView('fees')" class="premium-card p-6 rounded-[2.5rem] text-center flex flex-col items-center justify-center min-h-[160px]">
                    <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center mb-3">
                        <i class="fas fa-wallet text-emerald-400 text-xl"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest">Fees</h3>
                    <p class="text-[10px] text-slate-500 mt-1" id="stat-fees">₹0</p>
                </div>

                <!-- Card 4: New Entry -->
                <div onclick="toggleModal(true)" class="premium-card p-6 rounded-[2.5rem] text-center flex flex-col items-center justify-center min-h-[160px] border-dashed border-indigo-500/40">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-indigo-600/20">
                        <i class="fas fa-plus text-white text-xl"></i>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest">New Entry</h3>
                    <p class="text-[10px] text-slate-500 mt-1">Add Student</p>
                </div>
            </div>
        </div>

        <!-- View 2: Member List View -->
        <div id="view-members" class="hidden-view space-y-6">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black italic tracking-tight uppercase">Members List</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Active Records</p>
                </div>
                <button onclick="showView('dashboard')" class="text-[10px] font-black text-indigo-400 border border-indigo-500/30 px-4 py-2 rounded-xl uppercase">Back</button>
            </div>

            <div class="relative group">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" oninput="renderList()" placeholder="Student ka naam..." 
                    class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-sm focus:outline-none focus:border-indigo-500 transition-all">
            </div>

            <div id="studentContainer" class="space-y-4">
                <!-- List loads here -->
            </div>

            <button onclick="showView('dashboard')" class="w-full py-4 glass rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 hover:text-white transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </button>
        </div>

        <!-- View 3: Fees / Attendance Placeholder -->
        <div id="view-generic" class="hidden-view space-y-6 py-20 text-center">
            <i class="fas fa-tools text-4xl text-slate-700 mb-4"></i>
            <h3 class="text-xl font-black italic uppercase" id="generic-title">Section Title</h3>
            <p class="text-sm text-slate-500">Ye section abhi development mein hai.</p>
            <button onclick="showView('dashboard')" class="mt-6 px-8 py-3 btn-primary rounded-xl text-[10px] font-black uppercase tracking-widest">Go Back</button>
        </div>

    </main>

    <!-- Registration Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="modal-content glass w-full max-w-sm rounded-[2.5rem] p-8 scale-90 opacity-0 transform">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black italic">NEW REGISTRATION</h2>
                <button onclick="toggleModal(false)" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form id="studentForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Student Name</label>
                    <input type="text" id="mName" required placeholder="Full Name"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Mobile Number</label>
                    <input type="tel" id="mPhone" required maxlength="10" placeholder="10 Digit Number"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Fee (₹)</label>
                    <input type="number" id="mFee" required placeholder="Amount"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <button type="submit" id="saveBtn" class="btn-primary w-full py-4 rounded-xl text-white font-black uppercase tracking-widest text-xs mt-4">
                    Confirm & Save
                </button>
            </form>
        </div>
    </div>

    <script>
        const config = JSON.parse(__firebase_config);
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'savitri-library-premium';

        let allStudents = [];

        // Auth & Init
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
            loadData();
        };

        // View Switcher
        function showView(viewName) {
            document.getElementById('view-dashboard').classList.add('hidden-view');
            document.getElementById('view-members').classList.add('hidden-view');
            document.getElementById('view-generic').classList.add('hidden-view');

            if(viewName === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden-view');
            } else if(viewName === 'members') {
                document.getElementById('view-members').classList.remove('hidden-view');
                renderList();
            } else {
                document.getElementById('view-generic').classList.remove('hidden-view');
                document.getElementById('generic-title').innerText = viewName;
            }
            window.scrollTo(0,0);
        }

        // Real-time Cloud Sync
        function loadData() {
            const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members');
            path.onSnapshot((snapshot) => {
                allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateStats();
                if(!document.getElementById('view-members').classList.contains('hidden-view')) renderList();
            });
        }

        function renderList() {
            const container = document.getElementById('studentContainer');
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allStudents.filter(s => s.name.toLowerCase().includes(term) || s.phone.includes(term));

            container.innerHTML = filtered.map(s => `
                <div class="premium-card p-5 rounded-[2rem] flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center font-black text-indigo-400">
                            ${s.name.charAt(0)}
                        </div>
                        <div>
                            <h4 class="font-bold text-white text-sm">${s.name}</h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">${s.phone}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="sendWhatsApp('${s.phone}', '${s.name}', '${s.amount}')" class="w-9 h-9 rounded-lg bg-emerald-500/10 text-emerald-500 flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                        <button onclick="deleteStudent('${s.id}')" class="w-9 h-9 rounded-lg bg-rose-500/10 text-rose-500 flex items-center justify-center"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('stat-count').innerText = `${allStudents.length} Students`;
            const rev = allStudents.reduce((sum, s) => sum + Number(s.amount), 0);
            document.getElementById('stat-fees').innerText = '₹' + rev.toLocaleString('en-IN');
        }

        // Action: Save New
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('mName').value,
                phone: document.getElementById('mPhone').value,
                amount: document.getElementById('mFee').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').add(data);
                toggleModal(false);
                e.target.reset();
            } catch (err) {
                console.error("Save Error:", err);
            } finally {
                btn.innerText = "Confirm & Save";
                btn.disabled = false;
            }
        });

        window.deleteStudent = async (id) => {
            if(!confirm('Kya aap ise delete karna chahte hain?')) return;
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(id).delete();
        };

        window.sendWhatsApp = (num, name, amt) => {
            const msg = `Namaste ${name}, Savitri Success Library mein aapki fees ₹${amt} baki hai.`;
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        function toggleModal(show) {
            const m = document.getElementById('modal');
            const c = m.querySelector('.modal-content');
            if(show) {
                m.classList.remove('hidden');
                setTimeout(() => c.classList.remove('scale-90', 'opacity-0'), 10);
            } else {
                c.classList.add('scale-90', 'opacity-0');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
