<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Success Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white">

    <!-- Landing & Login Page -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-between p-8">
        <div class="flex-1 flex flex-col items-center justify-center w-full space-y-8">
            <div class="text-center">
                <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] mx-auto flex items-center justify-center shadow-2xl mb-6 rotate-3">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                </div>
                <h1 class="text-4xl font-black italic tracking-tighter uppercase">Savitri Success</h1>
                <p class="text-[10px] text-indigo-400 font-bold tracking-[0.4em] uppercase">Library Portal</p>
            </div>

            <div class="w-full max-w-sm glass-card p-8 space-y-4">
                <input type="text" id="username" placeholder="Username / Student ID" class="w-full">
                <input type="password" id="password" placeholder="Password / Mobile" class="w-full">
                <button onclick="handleLogin()" class="btn-primary w-full py-4">Enter Dashboard</button>
                <p id="loginError" class="text-rose-500 text-center text-[10px] font-bold hidden">Invalid Details!</p>
            </div>
        </div>

        <!-- Rahul Chauhan Signature -->
        <div class="pb-6 text-center">
            <p class="text-xs font-black italic text-slate-400 uppercase tracking-widest">
                Founder - <span class="text-indigo-400">Rahul Chauhan</span>
            </p>
        </div>
    </div>

    <!-- Dashboard Content (Initially Hidden) -->
    <div id="dashboardMain" class="hidden min-h-screen pb-32">
        <header class="p-6 sticky top-0 z-50 flex justify-between items-center">
            <h2 class="font-black italic text-xl uppercase tracking-tighter">Savitri Success</h2>
            <button onclick="logout()" class="text-rose-500"><i class="fas fa-power-off text-xl"></i></button>
        </header>
        <main id="mainContent" class="p-6 max-w-lg mx-auto"></main>
    </div>

    <script src="app.js"></script>
</body>
</html>
