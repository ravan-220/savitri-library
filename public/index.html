<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Success Library | Management</title>
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .premium-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Modal Animation */
        #modal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 p-4 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-600/30">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight italic">SAVITRI SUCCESS</h1>
                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest leading-none">Library Management</p>
            </div>
        </div>
        <button onclick="toggleModal(true)" class="btn-primary w-10 h-10 rounded-xl flex items-center justify-center">
            <i class="fas fa-plus text-white"></i>
        </button>
    </header>

    <main class="p-5 max-w-2xl mx-auto space-y-6">
        
        <!-- Stats Row -->
        <div class="grid grid-cols-2 gap-4">
            <div class="premium-card p-5 rounded-[2rem] text-center">
                <i class="fas fa-users text-indigo-400 mb-2"></i>
                <h3 id="count-total" class="text-3xl font-black">0</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Total Students</p>
            </div>
            <div class="premium-card p-5 rounded-[2rem] text-center">
                <i class="fas fa-wallet text-emerald-400 mb-2"></i>
                <h3 id="revenue-total" class="text-3xl font-black">₹0</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Collection</p>
            </div>
        </div>

        <!-- Search -->
        <div class="relative group">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
            <input type="text" id="searchInput" oninput="renderList()" placeholder="Student ka naam dhunde..." 
                class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-sm focus:outline-none focus:border-indigo-500 transition-all">
        </div>

        <!-- Student List Container -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Active Records</h2>
                <span class="text-[10px] text-indigo-400 font-bold" id="lastSync">Real-time Cloud</span>
            </div>
            <div id="studentContainer" class="space-y-4">
                <!-- Data will be loaded here -->
                <div class="py-10 text-center text-slate-600 animate-pulse">Data load ho raha hai...</div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="modal-content glass w-full max-w-sm rounded-[2.5rem] p-8 scale-90 opacity-0 transform">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black italic">REGISTER STUDENT</h2>
                <button onclick="toggleModal(false)" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <form id="studentForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Full Name</label>
                    <input type="text" id="mName" required placeholder="Ex: Rahul Kumar"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Mobile No.</label>
                    <input type="tel" id="mPhone" required maxlength="10" placeholder="98XXXXXXXX"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Fee Amount (₹)</label>
                    <input type="number" id="mFee" required placeholder="500"
                        class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-white outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="btn-primary w-full py-4 rounded-xl text-white font-black uppercase tracking-widest text-xs mt-4">
                    Save to Cloud
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const config = JSON.parse(__firebase_config);
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'savitri-library-premium';

        let allStudents = [];

        // Auth
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
            loadData();
        };

        // Real-time Load
        function loadData() {
            const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members');
            
            path.onSnapshot((snapshot) => {
                allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
                updateStats();
            }, (err) => console.error("Firestore Error:", err));
        }

        function renderList() {
            const container = document.getElementById('studentContainer');
            const term = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allStudents.filter(s => 
                s.name.toLowerCase().includes(term) || s.phone.includes(term)
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-600 italic">Koi student nahi mila...</div>`;
                return;
            }

            container.innerHTML = filtered.map(s => `
                <div class="premium-card p-5 rounded-[2rem] flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center font-black text-indigo-400 shadow-inner">
                            ${s.name.charAt(0)}
                        </div>
                        <div>
                            <h4 class="font-bold text-white leading-tight">${s.name}</h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-0.5">
                                <i class="fas fa-phone text-[8px] mr-1"></i> ${s.phone}
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="sendWhatsApp('${s.phone}', '${s.name}', '${s.amount}')" 
                            class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 flex items-center justify-center hover:bg-emerald-500 hover:text-white transition-all">
                            <i class="fab fa-whatsapp"></i>
                        </button>
                        <button onclick="deleteStudent('${s.id}')" 
                            class="w-10 h-10 rounded-xl bg-rose-500/10 text-rose-500 border border-rose-500/20 flex items-center justify-center hover:bg-rose-500 hover:text-white transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('count-total').innerText = allStudents.length;
            const rev = allStudents.reduce((sum, s) => sum + Number(s.amount), 0);
            document.getElementById('revenue-total').innerText = '₹' + rev.toLocaleString('en-IN');
        }

        // Action: Add
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('mName').value,
                phone: document.getElementById('mPhone').value,
                amount: document.getElementById('mFee').value,
                date: new Date().toLocaleDateString('en-IN')
            };

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').add(data);
                toggleModal(false);
                e.target.reset();
            } catch (err) {
                console.error("Save Error:", err);
            }
        });

        // Action: Delete
        window.deleteStudent = async (id) => {
            if(!confirm('Kya aap is student ko hatana chahte hain?')) return;
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(id).delete();
        };

        // Action: WhatsApp
        window.sendWhatsApp = (num, name, amt) => {
            const msg = `Namaste ${name}, Savitri Success Library mein aapki fees ₹${amt} baki hai. Kripya samay par jama karein. Dhanyawad!`;
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // UI Utils
        function toggleModal(show) {
            const m = document.getElementById('modal');
            const c = m.querySelector('.modal-content');
            if(show) {
                m.classList.remove('hidden');
                setTimeout(() => {
                    c.classList.remove('scale-90', 'opacity-0');
                }, 10);
            } else {
                c.classList.add('scale-90', 'opacity-0');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
