<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Success Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 bg-[#0f172a] z-[500] flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <h1 class="text-indigo-400 font-bold tracking-widest text-sm">SAVITRI LIBRARY CONNECTING...</h1>
        <p class="text-gray-500 text-[10px] mt-2">Checking connection...</p>
    </div>

    <!-- Login Area -->
    <div id="loginPage" class="hidden flex items-center justify-center min-h-screen px-6">
        <div class="w-full max-w-md glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black tracking-tighter">SAVITRI <span class="text-indigo-500">SUCCESS</span></h2>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Library Management</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Username (admin / Student ID)" class="w-full bg-slate-900 border border-white/10 rounded-xl py-4 px-5 outline-none focus:border-indigo-500 transition-all">
                <input type="password" id="passIn" placeholder="Password (1234 / Phone)" class="w-full bg-slate-900 border border-white/10 rounded-xl py-4 px-5 outline-none focus:border-indigo-500 transition-all">
                <button onclick="doLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/20 active:scale-[0.98] transition-all">LOGIN</button>
                <p id="errorMsg" class="text-red-400 text-center text-sm hidden">Invalid login credentials!</p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <nav class="p-5 flex justify-between items-center border-b border-white/5 bg-slate-900/50">
            <h1 class="font-bold">SAVITRI <span class="text-indigo-500">LIB</span></h1>
            <button onclick="location.reload()" class="text-gray-400"><i class="fas fa-sign-out-alt"></i></button>
        </nav>
        <div id="content" class="p-6 pb-32"></div>
        
        <!-- Bottom Nav (Admin Only) -->
        <div id="adminNav" class="fixed bottom-6 inset-x-6 hidden">
            <div class="max-w-md mx-auto bg-slate-900 border border-white/10 rounded-2xl p-3 flex justify-around items-center shadow-2xl">
                <button onclick="drawAdmin()" class="text-indigo-400"><i class="fas fa-users text-xl"></i></button>
                <button onclick="showAdd()" class="bg-indigo-600 w-12 h-12 rounded-full -mt-10 border-4 border-[#0f172a]"><i class="fas fa-plus"></i></button>
                <button onclick="drawLogs()" class="text-gray-400"><i class="fas fa-history text-xl"></i></button>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-6">
        <div class="glass p-6 rounded-2xl w-full max-w-sm">
            <h3 class="font-bold mb-4">Register Student</h3>
            <input type="text" id="newName" placeholder="Name" class="w-full bg-slate-800 p-3 rounded-lg mb-3">
            <input type="text" id="newPhone" placeholder="Phone" class="w-full bg-slate-800 p-3 rounded-lg mb-3">
            <input type="number" id="newFees" placeholder="Fees Due" class="w-full bg-slate-800 p-3 rounded-lg mb-4">
            <div class="flex gap-2">
                <button onclick="document.getElementById('addModal').classList.add('hidden')" class="flex-1 p-3 text-gray-400">Cancel</button>
                <button onclick="saveStudent()" class="flex-2 bg-indigo-600 px-6 py-3 rounded-lg font-bold">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'savitri-lib-77';

        let students = [];
        let logs = [];
        let user = null;

        // Force Show Login if Firebase is too slow (3 seconds)
        const forceLoad = setTimeout(() => {
            const loader = document.getElementById('loader');
            if(!loader.classList.contains('hidden')) {
                loader.classList.add('hidden');
                document.getElementById('loginPage').classList.remove('hidden');
            }
        }, 3000);

        async function init() {
            try {
                // RULE 3: Auth Before Queries
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (fbUser) => {
                    if (fbUser) {
                        // Sync Students
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (s) => {
                            students = s.docs.map(d => ({ id: d.id, ...d.data() }));
                            clearTimeout(forceLoad);
                            document.getElementById('loader').classList.add('hidden');
                            document.getElementById('loginPage').classList.remove('hidden');
                        }, (err) => console.error("Firestore Error:", err));

                        // Sync Logs
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), (s) => {
                            logs = s.docs.map(d => d.data());
                        }, (err) => console.error("Logs Error:", err));
                    }
                });
            } catch (e) {
                console.error("Auth Error:", e);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('loginPage').classList.remove('hidden');
            }
        }

        window.doLogin = () => {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            
            if(u === 'admin' && p === '1234') {
                user = { role: 'admin' };
                showDashboard();
            } else {
                const s = students.find(x => x.uid === u && x.phone === p);
                if(s) {
                    user = { role: 'student', ...s };
                    showDashboard();
                } else {
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            }
        };

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(user.role === 'admin') {
                document.getElementById('adminNav').classList.remove('hidden');
                drawAdmin();
            } else {
                drawStudent();
            }
        }

        window.drawAdmin = () => {
            let html = `<h2 class="text-xl font-bold mb-4">Students (${students.length})</h2><div class="space-y-3">`;
            students.forEach(s => {
                html += `
                <div class="glass p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="font-bold">${s.name}</p>
                        <p class="text-xs text-indigo-400">ID: ${s.uid} | ₹${s.fees} Pending</p>
                    </div>
                    <button onclick="delStudent('${s.id}')" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button>
                </div>`;
            });
            document.getElementById('content').innerHTML = html + `</div>`;
        };

        window.drawStudent = () => {
            const today = new Date().toLocaleDateString('en-GB');
            const mark = logs.find(l => l.uid === user.uid && l.date === today);
            document.getElementById('content').innerHTML = `
                <div class="text-center py-10">
                    <div class="w-20 h-20 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-bold mb-4 shadow-xl">${user.name[0]}</div>
                    <h2 class="text-2xl font-bold">${user.name}</h2>
                    <p class="text-indigo-400 mb-8">Student ID: ${user.uid}</p>
                    <div class="glass p-6 rounded-2xl mb-6">
                        <p class="text-sm text-gray-400">Fee Status</p>
                        <p class="text-xl font-bold ${user.fees > 0 ? 'text-rose-400' : 'text-emerald-400'}">₹${user.fees} Pending</p>
                    </div>
                    <button onclick="markAtt()" ${mark ? 'disabled' : ''} class="w-full py-4 rounded-xl font-bold ${mark ? 'bg-emerald-600/20 text-emerald-500' : 'bg-indigo-600 shadow-lg shadow-indigo-500/30'}">
                        ${mark ? '<i class="fas fa-check mr-2"></i> PRESENT' : 'MARK ATTENDANCE'}
                    </button>
                </div>
            `;
        };

        window.markAtt = async () => {
            if (!auth.currentUser) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                uid: user.uid,
                name: user.name,
                date: new Date().toLocaleDateString('en-GB'),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
            drawStudent();
        };

        window.saveStudent = async () => {
            if (!auth.currentUser) return;
            const n = document.getElementById('newName').value;
            const p = document.getElementById('newPhone').value;
            const f = document.getElementById('newFees').value;
            if(!n || !p) return;
            
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                uid: 'LIB' + Math.floor(1000 + Math.random()*9000),
                name: n, phone: p, fees: f || 0
            });
            document.getElementById('addModal').classList.add('hidden');
            // Reset fields
            document.getElementById('newName').value = '';
            document.getElementById('newPhone').value = '';
            document.getElementById('newFees').value = '';
        };

        window.delStudent = async (id) => {
            if (!auth.currentUser) return;
            if(confirm("Delete student?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
        };

        window.showAdd = () => document.getElementById('addModal').classList.remove('hidden');
        
        window.drawLogs = () => {
            let html = `<h2 class="text-xl font-bold mb-4">Attendance Logs</h2><div class="space-y-2">`;
            const sortedLogs = [...logs].reverse();
            sortedLogs.forEach(l => {
                html += `<div class="glass p-3 rounded-lg flex justify-between text-sm">
                    <span class="font-medium">${l.name}</span>
                    <span class="text-indigo-400 font-mono">${l.date} ${l.time}</span>
                </div>`;
            });
            document.getElementById('content').innerHTML = html + `</div>`;
        };

        init();
    </script>
</body>
</html>
