<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Success Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .loader-spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #6366f1; color: white; padding: 10px 20px; border-radius: 50px; z-index: 5000; font-size: 12px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 bg-[#0b0f1a] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader-spin mb-4"></div>
        <p class="text-indigo-400 text-[10px] font-bold tracking-widest uppercase">System Starting...</p>
    </div>

    <!-- Login Page -->
    <div id="loginPage" class="flex-1 flex items-center justify-center px-6">
        <div class="w-full max-w-[340px] glass p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                    <i class="fas fa-book-reader text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter">SAVITRI <span class="text-indigo-500 italic">SUCCESS</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Management Console</p>
            </div>

            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="userIn" placeholder="User ID / Admin" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-12 pr-6 outline-none transition-all text-sm text-white">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="password" id="passIn" placeholder="Password" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-12 pr-6 outline-none transition-all text-sm text-white">
                </div>
                
                <button id="loginBtn" onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black tracking-widest uppercase shadow-lg shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="btnText">LOGIN</span>
                    <div id="btnLoader" class="loader-spin hidden" style="width:18px; height:18px;"></div>
                </button>

                <p id="errorMsg" class="text-rose-500 text-center text-[11px] font-bold hidden"></p>
                <p class="text-[9px] text-center text-gray-600 uppercase mt-4">Admin Credentials: Admin / 1234</p>
            </div>
        </div>
    </div>

    <!-- Main App Dashboard -->
    <div id="dashboard" class="hidden flex-1 flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
            <h2 class="font-black italic text-lg">SAVITRI <span class="text-indigo-500">LIB</span></h2>
            <button onclick="location.reload()" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-rose-500"><i class="fas fa-power-off"></i></button>
        </header>

        <main id="content" class="flex-1 p-6 pb-32 overflow-y-auto max-w-lg mx-auto w-full"></main>

        <!-- Navigation -->
        <nav id="adminNav" class="fixed bottom-6 inset-x-6 hidden z-50">
            <div class="max-w-md mx-auto bg-slate-900/90 border border-white/10 backdrop-blur-xl rounded-full p-2 flex justify-between items-center shadow-2xl">
                <button onclick="showStudents()" class="flex-1 py-3 text-indigo-400"><i class="fas fa-users-cog text-xl"></i></button>
                <button onclick="openAddModal()" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white -mt-10 border-4 border-[#0b0f1a] shadow-xl active:scale-90 transition-all"><i class="fas fa-plus text-lg"></i></button>
                <button onclick="showLogs()" class="flex-1 py-3 text-gray-500"><i class="fas fa-clock-rotate-left text-xl"></i></button>
            </div>
        </nav>
    </div>

    <!-- Registration Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 z-[2000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass p-8 rounded-[2rem] w-full max-w-sm border border-white/10">
            <h3 class="text-xl font-black mb-6 uppercase italic">Add Member</h3>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-white/5 text-white">
                <input type="text" id="regPhone" placeholder="Mobile Number" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-white/5 text-white">
                <input type="number" id="regFees" placeholder="Fees (₹)" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-white/5 text-white">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 font-bold text-gray-500">CANCEL</button>
                    <button id="saveBtn" onclick="saveNewStudent()" class="flex-1 bg-indigo-600 p-4 rounded-xl font-bold shadow-lg shadow-indigo-500/20">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'savitri-lib-v1';

        let students = [];
        let logs = [];
        let currentUser = null;

        // Force hide splash after 3 seconds anyway
        setTimeout(hideSplash, 3000);

        async function startApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (snap) => {
                            students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            hideSplash();
                        }, (err) => { hideSplash(); });

                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), (snap) => {
                            logs = snap.docs.map(d => d.data());
                        });
                    }
                });
            } catch (e) { hideSplash(); }
        }

        function hideSplash() {
            const splash = document.getElementById('splash');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.classList.add('hidden'), 500);
            }
        }

        window.handleLogin = () => {
            const u = document.getElementById('userIn').value.trim();
            const p = document.getElementById('passIn').value.trim();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLdr = document.getElementById('btnLoader');
            const err = document.getElementById('errorMsg');

            if(!u || !p) {
                err.innerText = "Please fill all fields";
                err.classList.remove('hidden');
                return;
            }

            err.classList.add('hidden');
            btnText.classList.add('hidden');
            btnLdr.classList.remove('hidden');
            btn.disabled = true;

            // Admin Logic - Case Insensitive
            if(u.toLowerCase() === 'admin' && p === '1234') {
                setTimeout(() => {
                    currentUser = { role: 'admin' };
                    loadDashboard();
                }, 500);
                return;
            }

            // Student Logic
            const found = students.find(s => s.uid === u && s.phone === p);
            if(found) {
                setTimeout(() => {
                    currentUser = { role: 'student', ...found };
                    loadDashboard();
                }, 500);
            } else {
                setTimeout(() => {
                    btnText.classList.remove('hidden');
                    btnLdr.classList.add('hidden');
                    btn.disabled = false;
                    err.innerText = "Invalid User ID or Password";
                    err.classList.remove('hidden');
                }, 800);
            }
        };

        function loadDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            if(currentUser.role === 'admin') {
                document.getElementById('adminNav').classList.remove('hidden');
                showStudents();
            } else {
                showStudentHome();
            }
        }

        window.showStudents = () => {
            let html = `<div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black italic uppercase">Members</h3>
                <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full font-bold border border-indigo-500/30">${students.length} TOTAL</span>
            </div><div class="space-y-3">`;
            
            if(students.length === 0) html += `<div class="text-center py-20 text-gray-500 italic">No members yet.</div>`;

            students.forEach(s => {
                const pending = Number(s.fees) >
